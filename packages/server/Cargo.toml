[package]
name = "server"
version = "0.1.0"
edition = "2024"

[dependencies]
literator = "0.2.0"
thiserror = "2.0.18"
const_format = "0.2.35"
log = { version = "0.4.29", features = [ "serde" ] }
sha2 = "0.11.0"
textwrap = "0.16.2"
ouroboros = "0.18.5"
env_logger = "0.11.8"
colog = "1.4.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
itertools = "0.14.0"
clap = { version = "4.6.0", features = [ "derive" ] }
envy = "0.4"
toml = "1.1.0+spec-1.1.0"
actix-web = "4"
xshell = "0.2.7"
tokio = { version = "1.51.0", features = ["macros", "sync"] }
sqlx = { version = "0.8.6", features = ["tls-native-tls", "sqlite"] }
reqwest = "0.13.2"
actix-ws = "0.4.0"
