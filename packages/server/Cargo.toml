[package]
name = "server"
version = "0.1.0"
edition = "2024"

[dependencies]
literator = "0.2.0"
thiserror = "2.0.18"
const_format = "0.2.35"
log = { version = "0.4.29", features = ["serde"] }
sha2 = "0.11.0"
textwrap = "0.16.2"
ouroboros = "0.18.5"
env_logger = "0.11.8"
colog = "1.4.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
itertools = "0.14.0"
clap = { version = "4.6.0", features = ["derive"] }
envy = "0.4"
toml = "1.1.0+spec-1.1.0"
actix-web = "4"
actix-files = "0.6.10"
xshell = "0.2.7"
async-stripe = { version = "0.41.0", features = [ "runtime-tokio-hyper" ] }
tokio = { version = "1.51.0", features = ["macros", "sync"] }
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite"] }
reqwest = { version = "0.13.2", features = ["form", "json", "query"] }
actix-ws = "0.4.0"
chrono = "0.4.44"
futures-util = "0.3.32"
rand = "0.10.0"
regex = "1.12.3"
serde_urlencoded = "0.7.1"
url = "2.5.8"

[features]
dev = []
